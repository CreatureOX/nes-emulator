name: Build and Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.7'

    - name: Install MSVC Build Tools
      uses: ilammy/msvc-dev-cmd@v1

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~\AppData\Local\pip\Cache
          **\node_modules
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyyaml==6.0.1 altgraph==0.17.4 importlib-metadata==6.7.0 ordered-set==4.1.0 packaging==24.0 pefile==2024.8.26 pip==20.1.1 psutil==7.0.0 pyinstaller==5.13.2 pyinstaller-hooks-contrib==2024.7 pywin32-ctypes==0.2.3 setuptools==68.0.0 typing-extensions==4.7.1 zipp==3.15.0 zstandard==0.21.0

        pip install nuitka

    - name: Install Visual C++ Redistributable
      run: choco install -y vcredist-all

    - name: Build Cython extensions
      run: |
        python setup.py build_ext --inplace

    - name: Package with Nuitka
      run: |
        nuitka --standalone `
          --windows-disable-console `
          --output-dir=dist `
          --include-package=nes `
          --include-package=gui `
          --include-package=pygame `
          --include-package=numpy `
          --include-package=cv2 `
          --include-package=PIL `
          --include-package=FreeSimpleGUI `
          --enable-plugin=tk-inter `
          --include-data-dir=roms=roms `
          --show-progress `
          --jobs=2 `
          --follow-imports `
          nes-emulator.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nes-emulator
        path: |
          dist/
        retention-days: 1